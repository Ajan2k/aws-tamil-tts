version: '3.8'
services:
  tamil-tts:
    build:
      context: .
      args:
        - HF_TOKEN=${HF_TOKEN:-}
    container_name: tamil-tts
    ports:
      - "8000:8000"
    environment:
      - MODEL_ID=ai4bharat/vits_rasa_13
      - SPEAKER_ID=18
      - STYLE_ID=4
      - HF_TOKEN=${HF_TOKEN:-}
    volumes:
      # For custom model
      # - ./models:/models
      - tts_cache:/tmp/tts_cache
      - tts_output:/tmp/tts_outputs
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    # Comment above deploy block if using CPU only (t3.medium)

volumes:
  tts_cache:
  tts_output:
